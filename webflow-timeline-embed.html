<!-- ============================================================
  The Original Rich's Ice Cream — Interactive Heritage Timeline
  Paste this ENTIRE block into a Webflow "Embed" element.
  (Add panel: drag an "Embed" element where you want the timeline,
   paste this, Save. It renders on the published/preview site.)
============================================================ -->
<div id="rht-timeline" class="rht" aria-label="The Original Rich's Ice Cream history timeline">
  <div class="rht-track" role="tablist" aria-label="Company milestones"></div>
  <div class="rht-stage"></div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap');
#rht-timeline.rht{--red:#a81f23;--red-dark:#7c1517;--gold:#c8901e;--gold-lt:#e0b34e;--cream:#f8efdd;--soft:#fbf6ea;--ink:#3f140f;--slate:#875f52;--line:#ecdcc0;
  font-family:'DM Sans',system-ui,sans-serif;max-width:1160px;margin:0 auto;color:var(--ink)}
#rht-timeline .rht-track{position:relative;display:flex;justify-content:space-between;gap:.4rem;padding:1.5rem 2px .3rem;overflow-x:auto;scrollbar-width:none}
#rht-timeline .rht-track::-webkit-scrollbar{height:0}
#rht-timeline .rht-line{position:absolute;top:calc(1.5rem + 6px);left:8px;right:8px;height:3px;background:var(--line);border-radius:3px}
#rht-timeline .rht-fill{position:absolute;top:0;left:0;height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
#rht-timeline .rht-node{flex:0 0 auto;min-width:74px;display:flex;flex-direction:column;align-items:center;gap:.5rem;background:none;border:0;cursor:pointer;scroll-snap-align:center;padding:0;color:var(--slate);font:inherit}
#rht-timeline .rht-dot{width:15px;height:15px;border-radius:50%;background:#fff;border:3px solid var(--gold-lt);position:relative;z-index:1;transition:transform .2s,border-color .2s,background .2s,box-shadow .2s}
#rht-timeline .rht-yr{font-family:'Playfair Display',serif;font-weight:800;font-size:1.05rem;letter-spacing:.01em;transition:color .2s}
#rht-timeline .rht-node:hover .rht-dot,#rht-timeline .rht-node:focus-visible .rht-dot{transform:scale(1.18);border-color:var(--red)}
#rht-timeline .rht-node:focus-visible{outline:none}
#rht-timeline .rht-node[aria-selected="true"] .rht-dot{background:var(--red);border-color:var(--red);transform:scale(1.4);box-shadow:0 0 0 6px rgba(168,31,35,.16)}
#rht-timeline .rht-node[aria-selected="true"] .rht-yr{color:var(--red-dark)}
#rht-timeline .rht-node[aria-selected="true"] .rht-dot::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--red);animation:rhtPulse 1.7s ease-out infinite}
@keyframes rhtPulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.3);opacity:0}}
#rht-timeline .rht-stage{position:relative;margin-top:1.5rem;background:var(--soft);border:1px solid var(--line);border-radius:16px;overflow:hidden;min-height:250px;box-shadow:0 22px 50px -34px rgba(63,20,15,.45)}
#rht-timeline .rht-panel{position:absolute;inset:0;display:grid;grid-template-columns:1.02fr .98fr;gap:1.8rem;padding:2rem;opacity:0;transform:translateY(16px);pointer-events:none;transition:opacity .5s ease,transform .5s ease}
#rht-timeline .rht-panel.active{opacity:1;transform:none;pointer-events:auto;position:relative}
#rht-timeline .rht-body{align-self:center}
#rht-timeline .rht-kind{display:inline-block;font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
#rht-timeline .rht-pyr{font-family:'Playfair Display',serif;font-weight:900;font-size:3rem;color:var(--red);line-height:.95}
#rht-timeline .rht-h3{font-family:'Playfair Display',serif;font-weight:800;font-size:1.6rem;color:var(--ink);margin:.3rem 0 .6rem}
#rht-timeline .rht-p{color:var(--slate);margin:0;line-height:1.6;font-size:1.02rem}
#rht-timeline .rht-media{border-radius:12px;overflow:hidden;align-self:stretch;min-height:300px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--red-dark),var(--red));position:relative}
#rht-timeline .rht-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 32%;display:block}
#rht-timeline .rht-media.photo img{object-position:50% 45%}
#rht-timeline .rht-media.hist img{filter:sepia(.32) contrast(1.04) saturate(.92) brightness(1.03);animation:rhtKb 15s ease-in-out infinite alternate}
#rht-timeline .rht-media.photo img{animation:rhtKb 15s ease-in-out infinite alternate}
@keyframes rhtKb{from{transform:scale(1.03)}to{transform:scale(1.14)}}
#rht-timeline .rht-media.branch,#rht-timeline .rht-media.emblem{flex-direction:column;color:#fff;gap:.55rem;text-align:center;padding:1.6rem}
#rht-timeline .rht-media .rht-pin{width:52px;height:52px}
#rht-timeline .rht-city{font-family:'Playfair Display',serif;font-weight:800;font-size:2rem;line-height:1;color:var(--cream)}
#rht-timeline .rht-addr{font-size:.9rem;color:#f6ddc0;letter-spacing:.01em}
#rht-timeline .rht-sub{font-size:.72rem;color:var(--gold-lt);letter-spacing:.16em;text-transform:uppercase;font-weight:700}
#rht-timeline .rht-wm{font-family:'Playfair Display',serif;font-weight:900;font-size:5rem;color:rgba(255,255,255,.15);line-height:1}
#rht-timeline .rht-emblem-ico{width:56px;height:56px;opacity:.95}
@media (max-width:760px){
  #rht-timeline .rht-panel{grid-template-columns:1fr;gap:1.2rem;padding:1.4rem}
  #rht-timeline .rht-media{min-height:180px;order:2}
  #rht-timeline .rht-stage{min-height:0}
  #rht-timeline .rht-pyr{font-size:2.5rem}
  #rht-timeline .rht-h3{font-size:1.35rem}
}
@media (prefers-reduced-motion:reduce){
  #rht-timeline .rht-media.hist img,#rht-timeline .rht-media.photo img,#rht-timeline .rht-node[aria-selected="true"] .rht-dot::after{animation:none}
  #rht-timeline .rht-panel{transition:opacity .2s}
}
</style>

<script>
(function(){
  var root=document.getElementById('rht-timeline');
  if(!root||root.dataset.init)return; root.dataset.init='1';
  var IMG='https://oakleafdave.github.io/richs-ice-cream/assets/img/';
  var items=[
    {year:'1955',title:'The first stand',kind:'founding',photo:IMG+'fam2.jpg',text:'Rich &amp; June Gutwein open one of Ocean County&rsquo;s first Carvel stands at Route 37 East &amp; King Street in Toms River &mdash; homemade soft-serve, one little window, and a line down the block all summer long.'},
    {year:'1958',title:'A family business',kind:'milestone',photo:IMG+'fam3.jpg',text:'What began as a summer stand becomes the family&rsquo;s life&rsquo;s work. The Gutwein kids grow up behind the counter, learning the recipes that still run the shop today.'},
    {year:'1965',title:'The Richie Bar is born',kind:'signature',text:'Rich perfects his own chocolate-dipped ice cream bar &mdash; the legendary Richie Bar &mdash; drops the franchise, and strikes out under the family name: Rich&rsquo;s Ice Cream.'},
    {year:'1980s',title:'The next generation',kind:'milestone',photo:IMG+'fam1.jpg',text:'The second generation steps up in their Rich&rsquo;s shirts. Same hand-cranked recipes, same shore families coming back summer after summer.'},
    {year:'Today',title:'Third generation',kind:'milestone',photo:IMG+'richs-shop-today.jpg',text:'Grandson Hunter Gutwein carries the tradition forward across three shore shops &mdash; Lanoka Harbor, Toms River &amp; Manahawkin &mdash; still scooping the Richie Bar the original way.'},
    {year:'2026',title:'Surf City opens',kind:'branch',city:'Surf City',addr:'512 Long Beach Blvd',text:'Rich&rsquo;s brings the Richie Bar to the island. Our newest shop opens on Long Beach Blvd in Surf City &mdash; four locations, one seventy-year-old family recipe.'}
  ];
  var KIND={founding:'The Founding',milestone:'Milestone',signature:'Our Signature',branch:'Now Open'};
  var PIN='<svg class="rht-pin" viewBox="0 0 24 24" fill="#e0b34e" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>';
  var CONE='<svg class="rht-emblem-ico" viewBox="0 0 24 24" fill="none" stroke="#e0b34e" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true"><path d="M7 9a5 5 0 0 1 10 0"/><path d="M6.6 9.4a3 3 0 0 0 3 2.1 3 3 0 0 0 2.4 1.2 3 3 0 0 0 2.4-1.2 3 3 0 0 0 3-2.1"/><path d="M7.6 12.5 12 22l4.4-9.5"/></svg>';
  var track=root.querySelector('.rht-track'), stage=root.querySelector('.rht-stage');
  var line=document.createElement('div'); line.className='rht-line';
  var fill=document.createElement('span'); fill.className='rht-fill'; line.appendChild(fill); track.appendChild(line);
  items.forEach(function(it,i){
    var n=document.createElement('button');
    n.className='rht-node'; n.type='button'; n.setAttribute('role','tab');
    n.id='rht-t'+i; n.setAttribute('aria-controls','rht-p'+i); n.setAttribute('aria-selected','false'); n.tabIndex=-1;
    n.innerHTML='<span class="rht-dot"></span><span class="rht-yr">'+it.year+'</span>';
    track.appendChild(n);
    var media;
    if(it.kind==='branch') media='<div class="rht-media branch">'+PIN+'<div class="rht-city">'+it.city+', NJ</div><div class="rht-addr">'+it.addr+'</div><div class="rht-sub">Now open</div></div>';
    else if(it.photo&&it.year==='Today') media='<div class="rht-media photo"><img src="'+it.photo+'" alt="Rich&rsquo;s Ice Cream shop today" loading="lazy"></div>';
    else if(it.photo) media='<div class="rht-media hist"><img src="'+it.photo+'" alt="The Original Rich&rsquo;s Ice Cream, '+it.year+'" loading="lazy"></div>';
    else media='<div class="rht-media emblem"><span class="rht-wm">'+it.year+'</span>'+CONE+'</div>';
    var p=document.createElement('article');
    p.className='rht-panel'; p.id='rht-p'+i; p.setAttribute('role','tabpanel'); p.setAttribute('aria-labelledby','rht-t'+i);
    p.innerHTML='<div class="rht-body"><span class="rht-kind">'+(KIND[it.kind]||'Milestone')+'</span><div class="rht-pyr">'+it.year+'</div><div class="rht-h3">'+it.title+'</div><p class="rht-p">'+it.text+'</p></div>'+media;
    stage.appendChild(p);
  });
  var nodes=[].slice.call(track.querySelectorAll('.rht-node'));
  var panels=[].slice.call(stage.querySelectorAll('.rht-panel'));
  var cur=-1, timer=null;
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var canHover=window.matchMedia&&window.matchMedia('(hover:hover)').matches;
  function center(i){var n=nodes[i]; track.scrollTo({left:n.offsetLeft-track.clientWidth/2+n.offsetWidth/2, behavior:reduce?'auto':'smooth'});}
  function activate(i,focus){
    if(i===cur)return; cur=i;
    nodes.forEach(function(n,j){var on=j===i; n.setAttribute('aria-selected',on?'true':'false'); n.tabIndex=on?0:-1;});
    panels.forEach(function(p,j){p.classList.toggle('active',j===i);});
    fill.style.width=(nodes.length>1?(i/(nodes.length-1))*100:100)+'%';
    center(i); if(focus)nodes[i].focus();
  }
  function next(){activate((cur+1)%nodes.length);}
  function play(){if(reduce||timer)return; timer=setInterval(next,4200);}
  function stop(){clearInterval(timer); timer=null;}
  nodes.forEach(function(n,i){
    n.addEventListener('click',function(){stop();activate(i,true);});
    if(canHover)n.addEventListener('mouseenter',function(){activate(i);});
    n.addEventListener('focus',function(){stop();activate(i);});
    n.addEventListener('keydown',function(e){
      var t=null;
      if(e.key==='ArrowRight'||e.key==='ArrowDown')t=(i+1)%nodes.length;
      else if(e.key==='ArrowLeft'||e.key==='ArrowUp')t=(i-1+nodes.length)%nodes.length;
      else if(e.key==='Home')t=0; else if(e.key==='End')t=nodes.length-1;
      if(t!==null){e.preventDefault();stop();activate(t,true);}
    });
  });
  root.addEventListener('mouseenter',stop);
  root.addEventListener('mouseleave',play);
  root.addEventListener('focusout',function(e){if(!root.contains(e.relatedTarget))play();});
  activate(0);
  if('IntersectionObserver'in window){
    var io=new IntersectionObserver(function(es){es.forEach(function(e){e.isIntersecting?play():stop();});},{threshold:.2});
    io.observe(root);
  }
  document.addEventListener('visibilitychange',function(){if(document.hidden)stop();});
})();
</script>
